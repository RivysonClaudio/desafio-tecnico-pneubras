services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: desafio_java_pnblabs
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d desafio_java_pnblabs"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - pneubras-network

  api:
    build:
      context: https://github.com/RivysonClaudio/desafio-pneubras-api.git
    environment:
      DB_DRIVER: org.postgresql.Driver
      DB_URL: jdbc:postgresql://postgres:5432/desafio_java_pnblabs
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET_KEY: pneubras-desafio-java-jwt
      ADMIN_EMAIL: admin.api@pneubras.com
      ADMIN_PASSWORD: 12345678
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8080"
    networks:
      - pneubras-network

  web:
    build:
      context: https://github.com/RivysonClaudio/desafio-pneubras-web.git
      args:
        VITE_API_URL: /api/v1
    depends_on:
      - api
    expose:
      - "80"
    networks:
      - pneubras-network

  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api
    networks:
      - pneubras-network

volumes:
  postgres_data:

networks:
  pneubras-network:
    driver: bridge
